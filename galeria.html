body{

  color:white;
  text-align:center;
}

/* MENÚ */
.menu{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.7);
  padding:15px;
}

.menu a{
  color:white;
  margin:0 20px;
  text-decoration:none;
  font-weight:bold;
}

/* TÍTULO */
h1{
  margin-top:100px;
}

/* GALERÍA */
.galeria{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  padding:20px;
}

/* TARJETAS */
.card{
  background:rgba(255,255,255,0.1);
  padding:15px;
  border-radius:15px;
  width:220px;
}

.card img{
  width:100%;
  border-radius:10px;
}

/* BOTÓN */
.btn{
  display:inline-block;
  margin-top:10px;
  background:#ff6b6b;
  color:white;
  padding:10px 15px;
  border-radius:10px;
  text-decoration:none;
}
</style>
