<!DOCTYPE html>
<html>
<head>
<title>Galería de Arte</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg, #134e5e, #71b280);
    color: white;
    text-align: center;
    margin: 0;
}

/* Título */
h1{
    margin-top: 20px;
}

/* Galería */
.galeria{
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 40px;
    flex-wrap: wrap;
}

/* Tarjetas */
.card{
    position: relative;
    width: 260px;
    border-radius: 15px;
    overflow: hidden;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    transition: 0.4s;
    animation: aparecer 1s ease;
}

.card:hover{
    transform: translateY(-10px) scale(1.03);
}

/* Imagen */
.card img{
    width: 100%;
    height: 300px;
    object-fit: cover;
}

/* Overlay */
.overlay{
    position: absolute;
    bottom: 0;
    background: rgba(0,0,0,0.7);
    width: 100%;
    transform: translateY(100%);
    transition: 0.4s;
    padding: 10px;
}

.card:hover .overlay{
    transform: translateY(0);
}

/* Texto */
.overlay h3{
    margin: 5px;
}

.overlay p{
    margin: 5px;
    font-size: 14px;
}

/* Animación */
@keyframes aparecer{
    from{
        opacity: 0;
        transform: translateY(30px);
    }
    to{
        opacity: 1;
        transform: translateY(0);
    }
}

/* Botón */
button{
    background: #ff4d4d;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 20px;
}

button:hover{
    background: #ff1a1a;
}

/* Modal */
.modal{
    display: none;
    position: fixed;
    z-index: 1;
    padding-top: 50px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.9);
}

.modal img{
    margin: auto;
    display: block;
    max-width: 80%;
    border-radius: 10px;
}

.modal span{
    position: absolute;
    top: 20px;
    right: 35px;
    font-size: 40px;
    cursor: pointer;
}
</style>

</head>

<body>

<h1>🎨 Galería de Pinturas</h1>
<p>Artista: Rosaly</p>

<h2>Sobre mí</h2>
<p>Soy una artista apasionada por la pintura, enfocada en paisajes y naturaleza.</p>

<div class="galeria">

    <!-- OBRA 1 -->
    <div class="card" onclick="abrirModal('cuadro1.jpeg')">
        <img src="cuadro1.jpeg">
        <div class="overlay">
            <h3>Obra 1</h3>
            <p>Acrílico sobre lienzo</p>
            <p>2025</p>
        </div>
    </div>

    <!-- OBRA 2 -->
    <div class="card" onclick="abrirModal('cuadro2.jpeg')">
        <img src="cuadro2.jpeg">
        <div class="overlay">
            <h3>Obra 2</h3>
            <p>Pintura al óleo</p>
            <p>2025</p>
        </div>
    </div>

    <!-- OBRA 3 -->
    <div class="card" onclick="abrirModal('cuadro3.jpeg')">
        <img src="cuadro3.jpeg">
        <div class="overlay">
            <h3>Obra 3</h3>
            <p>Acuarela</p>
            <p>2025</p>
        </div>
    </div>

    <!-- OBRA 4 -->
    <div class="card" onclick="abrirModal('cuadro4.jpeg')">
        <img src="cuadro4.jpeg">
        <div class="overlay">
            <h3>Obra 4</h3>
            <p>Técnica mixta</p>
            <p>2025</p>
        </div>
    </div>

</div>

<h2>Contacto</h2>
<a href="mailto:tuemail@gmail.com">
    <button>Contáctame</button>
</a>

<!-- MODAL -->
<div id="miModal" class="modal">
    <span onclick="cerrarModal()">&times;</span>
    <img id="imgGrande">
</div>

<script>
function abrirModal(src){
    document.getElementById("miModal").style.display = "block";
    document.getElementById("imgGrande").src = src;
}

function cerrarModal(){
    document.getElementById("miModal").style.display = "none";
}
</script>

</body>
</html>
