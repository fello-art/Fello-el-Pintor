<!DOCTYPE html>

<html>

<head>

<title>Galería de Arte</title>

<style>

body{

    font-family: Arial;

    background: linear-gradient(135deg, #134e5e, #71b280);

    color: white;

    text-align: center;

    margin: 0;

}

/* Título */

h1{

    margin-top: 20px;

}

/* Contenedor */

.galeria{

    display: flex;

    justify-content: center;

    gap: 40px;

    margin-top: 30px;

    flex-wrap: wrap;

}

/* Tarjetas */

.card{

    background: rgba(255,255,255,0.08);

    backdrop-filter: blur(10px);

    padding: 15px;

    border-radius: 12px;

    width: 260px;

    box-shadow: 0 0 15px rgba(0,0,0,0.4);

    transition: 0.3s;

}

.card:hover{

    transform: translateY(-5px);

}

/* Imágenes */

.card img{

    width: 100%;

    border-radius: 10px;

    cursor: pointer;

    transition: 0.3s;

}

.card img:hover{

    transform: scale(1.08);

}

/* Botón */

button{

    background: #ff4d4d;

    color: white;

    border: none;

    padding: 10px 20px;

    border-radius: 8px;

    cursor: pointer;

}

button:hover{

    background: #ff1a1a;

}

/* Modal */

.modal{

    display: none;

    position: fixed;

    z-index: 1;

    padding-top: 50px;

    left: 0;

    top: 0;

    width: 100%;

    height: 100%;

    background-color: rgba(0,0,0,0.9);

}

.modal img{

    margin: auto;

    display: block;

    max-width: 80%;

    border-radius: 10px;

}

.modal span{

    position: absolute;

    top: 20px;

    right: 35px;

    font-size: 40px;

    cursor: pointer;

}

</style>

</head>

<body>

<h1>🎨 Galería de Pinturas</h1>

<p>Artista: Rosaly</p>

<!-- SOBRE MÍ -->

<h2>Sobre mí</h2>

<p>Soy una artista apasionada por la pintura, enfocada en paisajes y naturaleza.</p>

<!-- GALERÍA -->

<div class="galeria">

    <div class="card">

        <img src="cuadro1.jpeg" onclick="abrirModal(this.src)">

        <h3>Obra 1</h3>

        <p>Acrílico sobre lienzo</p>

        <p>2025</p>

    </div>

    <div class="card">

        <img src="cuadro2.jpeg" onclick="abrirModal(this.src)">

        <h3>Obra 2</h3>

        <p>Pintura al óleo</p>

        <p>2025</p>

    </div>

</div>

<!-- CONTACTO -->

<h2>Contacto</h2>

<a href="mailto:tuemail@gmail.com">

    <button>Contáctame</button>

</a>

<!-- MODAL -->

<div id="miModal" class="modal">

    <span onclick="cerrarModal()">&times;</span>

    <img id="imgGrande">

</div>

<script>

function abrirModal(src){

    document.getElementById("miModal").style.display = "block";

    document.getElementById("imgGrande").src = src;

}

function cerrarModal(){

    document.getElementById("miModal").style.display = "none";

}

</script>

</body>

</html>
